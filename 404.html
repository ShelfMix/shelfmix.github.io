<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening ShelfMix...</title>
  <script>
    const path = window.location.pathname.replace(/^\/+|\/+$/g, "");
    const parts = path.split("/").filter(Boolean).map(decodeURIComponent);
    const params = new URLSearchParams(window.location.search);

    const openShelf = ({ handle = "", shelf = "" } = {}) => {
      const q = new URLSearchParams();
      if (handle) q.set("u", handle.replace(/^@+/, ""));
      if (shelf) q.set("s", shelf);
      window.location.replace(`https://shareshuffle.com/shelf.html?${q.toString()}`);
    };

    if (parts.length >= 2) {
      openShelf({ handle: parts[0], shelf: parts[1] });
    } else if (parts.length === 1) {
      openShelf({ shelf: parts[0] });
    } else if (params.get("u") && params.get("s")) {
      openShelf({ handle: params.get("u"), shelf: params.get("s") });
    } else if (params.get("s")) {
      openShelf({ shelf: params.get("s") });
    } else {
      window.location.replace("https://shareshuffle.com");
    }
  </script>
</head>
<body>
  Opening ShelfMix...
</body>
</html>
